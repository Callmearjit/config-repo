server:
  port: 8082  # ← FIXED: Added unique port assignment
  forward-headers-strategy: framework

spring:
  application:
    name: auth-service
  cloud:
    config:
      enabled: true
      import-check:
        enabled: false
  devtools:
    restart:
      enabled: false

# ─────────────────────────────────────────────────────────────────────────
# SpringDoc Configuration for Swagger/OpenAPI
# ─────────────────────────────────────────────────────────────────────────
springdoc:
  swagger-ui:
    # Primary configuration for swagger UI
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    url: /v3/api-docs
    
    # Point to API Gateway as the primary server
    servers:
      - url: http://localhost:8089
        description: API Gateway (Recommended)
      - url: http://localhost:8082
        description: Direct Access (Auth Service)
    
    # Disable the default url and use configured urls
    disable-swagger-default-url: true
    
    # Better UX in Swagger UI
    operations-sorter: method
    tags-sorter: alpha
    
  # OpenAPI schema endpoint
  api-docs:
    path: /v3/api-docs
    enabled: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  secret: ${JWT_SECRET:secretarjituttt123455667ksfbbfXY}

logging:
  file:
    name: logs/auth-service.log
  level:
    root: INFO

---
spring:
  config:
    activate:
      on-profile: docker

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka
