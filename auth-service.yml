server:
  forward-headers-strategy: framework

spring:
  cloud:
    config:
      enabled: true
      import-check:
        enabled: false
  devtools:
    restart:
      enabled: false

springdoc:
  swagger-ui:
    config-url: /v3/api-docs/swagger-config
    url: /v3/api-docs
    path: /swagger-ui.html
    disable-swagger-default-url: true
    servers:
      - url: http://localhost:8089
        description: API Gateway
  api-docs:
    path: /v3/api-docs

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  secret: ${JWT_SECRET:secretarjituttt123455667ksfbbfXY}

logging:
  file:
    name: logs/auth-service.log
  level:
    root: INFO

---
spring:
  config:
    activate:
      on-profile: docker

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka
